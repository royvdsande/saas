<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050506" />
  <meta name="color-scheme" content="dark" />
  <title>Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="/daily/daily.css" />
</head>
<body class="daily-body is-loading-state">
  <div class="daily-grain" aria-hidden="true"></div>

  <a class="daily-back" href="/app/" aria-label="Back to dashboard">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
  </a>

  <main class="daily-main" id="daily-main">
    <div class="daily-streak" id="daily-streak">
      <span class="daily-streak-dot" aria-hidden="true"></span>
      <span id="daily-streak-text">Loading</span>
    </div>

    <h1 class="daily-question is-loading" id="daily-question" aria-live="polite">
      <span class="skeleton-line" style="display:inline-block;width:320px;max-width:90%;height:1.1em;vertical-align:middle"></span>
    </h1>

    <div class="daily-actions" id="daily-actions">
      <button class="daily-btn" id="daily-btn-yes" type="button" disabled>Yes</button>
      <button class="daily-btn" id="daily-btn-no" type="button" disabled>No</button>
    </div>

    <p class="daily-confirmation" id="daily-confirmation" aria-live="polite">&nbsp;</p>

    <p class="daily-answered" id="daily-answered" hidden></p>

    <section class="daily-history" id="daily-history" aria-label="Last 30 days"></section>
  </main>

  <script type="module" src="/daily/daily.js"></script>
</body>
</html>
