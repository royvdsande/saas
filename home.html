<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS App Boilerplate</title>
  <meta name="description" content="Launch faster with a reusable SaaS starter that already includes authentication, billing, and admin tooling." />
  <link rel="stylesheet" href="marketing.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/home" class="logo">SaaS <span>App</span></a>
      <nav class="nav-links">
        <a href="/home" class="active">Home</a>
        <a href="/over">About</a>
        <a href="/hoe-werkt-het">How it works</a>
        <a href="/pricing">Pricing</a>
        <a href="/contact">Contact</a>
      </nav>
      <a href="/" class="btn-primary">Open dashboard</a>
    </div>
  </header>

  <main>
    <section class="hero hero-grid compact-landing">
      <div class="hero-copy">
        <p class="hero-label">SaaS boilerplate</p>
        <h1>Auth, billing, and admin are already connected.</h1>
        <div class="hero-actions">
          <a href="/" class="btn-secondary">Open dashboard</a>
        </div>
      </div>

      <div class="auth-card">
        <p class="hero-label">Authentication</p>
        <h2>Sign in</h2>
        <div class="auth-status" id="auth-status">Not signed in.</div>
        <button id="btn-login-google" class="btn-primary auth-button">Continue with Google</button>

        <div class="auth-divider"><span>or</span></div>

        <label class="auth-label" for="email-input">Email</label>
        <div class="auth-row">
          <input id="email-input" type="email" placeholder="you@example.com" />
          <button id="email-login-btn" class="btn-secondary">Send link</button>
        </div>

        <div class="auth-actions-inline">
          <button id="logout-btn" class="btn-secondary" hidden>Log out</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="copyright" id="footer-copyright"></div>
      <div class="footer-links">
        <a href="/privacy">Privacy</a>
        <a href="/terms-of-service">Terms</a>
        <a href="/legal">Legal</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </footer>

  <script type="module" src="./home.js"></script>
</body>
</html>
